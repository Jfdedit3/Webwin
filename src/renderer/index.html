<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webwin</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-section">
        <div class="brand-dot"></div>
        <div>
          <div class="brand-title">Webwin</div>
          <div class="brand-subtitle">Windows Browser</div>
        </div>
      </div>

      <div class="tabs-section">
        <div id="tabs" class="tabs"></div>
        <div class="topbar-actions">
          <button id="menuButton" class="icon-button" type="button">☰</button>
          <button id="newTabButton" class="icon-button primary" type="button">+</button>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <div class="nav-group">
        <button id="backButton" class="icon-button" type="button">←</button>
        <button id="forwardButton" class="icon-button" type="button">→</button>
        <button id="reloadButton" class="icon-button" type="button">⟳</button>
        <button id="homeButton" class="icon-button" type="button">⌂</button>
      </div>

      <form id="addressForm" class="address-form">
        <input id="addressInput" class="address-input" type="text" placeholder="Search the web or enter a URL" autocomplete="off" />
      </form>

      <div class="actions-group">
        <button id="bookmarkButton" class="action-button" type="button">Bookmark</button>
        <button id="bookmarksToggleButton" class="action-button" type="button">Bookmarks</button>
      </div>
    </section>

    <div class="browser-stage">
      <aside id="menuPanel" class="side-panel hidden">
        <div class="panel-header">
          <h2>Menu</h2>
          <button id="closeMenuButton" class="icon-button" type="button">×</button>
        </div>
        <div class="menu-list">
          <button id="menuNewTab" class="menu-item" type="button">New tab</button>
          <button id="menuBookmarks" class="menu-item" type="button">Bookmarks</button>
          <button id="menuHistory" class="menu-item" type="button">History</button>
          <button id="menuDownloads" class="menu-item" type="button">Downloads</button>
          <button id="menuRestore" class="menu-item" type="button">Restore session now</button>
        </div>
      </aside>

      <aside id="bookmarksPanel" class="side-panel hidden panel-right">
        <div class="panel-header">
          <h2>Bookmarks</h2>
          <button id="closeBookmarksButton" class="icon-button" type="button">×</button>
        </div>
        <div id="bookmarksList" class="panel-list"></div>
      </aside>

      <aside id="historyPanel" class="side-panel hidden panel-right">
        <div class="panel-header">
          <h2>History</h2>
          <button id="closeHistoryButton" class="icon-button" type="button">×</button>
        </div>
        <div class="panel-actions">
          <button id="clearHistoryButton" class="action-button" type="button">Clear history</button>
        </div>
        <div id="historyList" class="panel-list"></div>
      </aside>

      <aside id="downloadsPanel" class="side-panel hidden panel-right">
        <div class="panel-header">
          <h2>Downloads</h2>
          <button id="closeDownloadsButton" class="icon-button" type="button">×</button>
        </div>
        <div id="downloadsList" class="panel-list"></div>
      </aside>

      <main id="webviews" class="webviews"></main>

      <div class="bottom-info">
        <div id="statusText">Ready</div>
        <div id="pageMeta">No page loaded</div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
