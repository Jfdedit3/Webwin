<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: radial-gradient(circle at top, #13234b 0%, #09111f 42%, #04070d 100%);
      color: #eef3ff;
    }
    .wrap {
      width: 100%; height: 100%; display: grid; place-items: center; padding: 24px;
    }
    .card {
      width: min(860px, 100%); border: 1px solid rgba(255,255,255,.08); border-radius: 28px;
      background: rgba(10, 16, 30, .72); backdrop-filter: blur(18px); padding: 34px; text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,.38);
    }
    .title { font-size: 42px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: #9eaad1; margin-bottom: 28px; }
    .search {
      width: 100%; height: 56px; border-radius: 18px; border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05); color: #fff; padding: 0 18px; outline: none; font-size: 16px;
    }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 24px;
    }
    .quick {
      display: block; padding: 18px; border-radius: 18px; text-decoration: none; color: #eef3ff;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
    }
    .quick small { display: block; margin-top: 6px; color: #95a4ce; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Webwin</div>
      <div class="subtitle">Fast start page for a modern desktop browser</div>
      <input id="search" class="search" type="text" placeholder="Search with Google or enter a URL" />
      <div class="grid">
        <a class="quick" href="https://www.google.com/">Google<small>Search</small></a>
        <a class="quick" href="https://www.youtube.com/">YouTube<small>Video</small></a>
        <a class="quick" href="https://github.com/">GitHub<small>Code</small></a>
        <a class="quick" href="https://chatgpt.com/">ChatGPT<small>AI</small></a>
      </div>
    </div>
  </div>
  <script>
    const input = document.getElementById('search');
    input.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;
      const value = input.value.trim();
      if (!value) return;
      const isUrl = /^https?:\/\//i.test(value) || /^(localhost|\d{1,3}(?:\.\d{1,3}){3}|[\w-]+\.[a-z]{2,})/i.test(value);
      const target = /^https?:\/\//i.test(value) ? value : isUrl ? `https://${value}` : `https://www.google.com/search?q=${encodeURIComponent(value)}`;
      location.href = target;
    });
  </script>
</body>
</html>
