appId: com.jfdedit3.webwin
productName: Webwin
publish: never
directories:
  buildResources: build
  output: release
files:
  - main.js
  - preload.js
  - src/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Webwin
